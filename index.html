<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitTrack Pro</title>
    
    <!-- PWA Tam Ekran Modu Ayarları -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitTrack">
    
    <!-- İKON ENTEGRASYONLARI -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #007aff;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --accent-legs: #5856d6;
            --accent-off: #8e8e93;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 16px 20px 16px;
        }

        h2, h3 {
            font-weight: 600;
            margin-bottom: 12px;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            width: 100%;
        }

        .compact-input {
            flex: 1;
            min-width: 0;
            background-color: #2c2c2e;
            border: none;
            border-radius: 8px;
            padding: 10px 6px;
            color: white;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .compact-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        input, select {
            flex: 1;
            background-color: #2c2c2e;
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            text-align-last: center;
        }

        input:focus, select:focus {
            background-color: #3a3a3c;
            border: 1px solid var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:active { opacity: 0.7; }

        /* Takvim Tasarımı */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }
        .weekday {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
            padding-bottom: 4px;
        }
        .day {
            background-color: #2c2c2e;
            padding: 10px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .day.today { border: 2px dashed var(--text-muted); }
        
        .day.selected { 
            border: 2px solid var(--accent-color) !important;
            font-weight: bold !important;
            color: #ffffff !important;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
        .dot-Push { background-color: var(--accent-red); }
        .dot-Pull { background-color: var(--accent-green); }
        .dot-Legs { background-color: var(--accent-legs); }
        .dot-OffDay { background-color: var(--accent-off); }

        /* Supplement Gridi */
        .supp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .supp-card {
            background-color: #2c2c2e;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .supp-card input {
            flex: none;
            width: 20px;
            height: 20px;
            accent-color: var(--accent-green);
        }

        /* Grafik */
        .chart-filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .chart-filter-btn {
            flex: 1;
            padding: 6px;
            font-size: 12px;
            background-color: #2c2c2e;
            border-radius: 6px;
            color: white;
            border: none;
        }
        .chart-filter-btn.active {
            background-color: var(--accent-color);
        }
        .chart-container {
            margin-top: 10px;
            background: #2c2c2e;
            border-radius: 8px;
            padding: 10px;
            position: relative;
        }
        .chart-legends {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }

        .program-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .program-btn { font-size: 14px; background-color: #2c2c2e; width: 100%; }
        .btn-Push { border-bottom: 3px solid var(--accent-red); }
        .btn-Pull { border-bottom: 3px solid var(--accent-green); }
        .btn-Legs { border-bottom: 3px solid var(--accent-legs); }
        .btn-Off { border-bottom: 3px solid var(--accent-off); }

        .exercise-box {
            background-color: #2c2c2e;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .exercise-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff9500;
        }
        
        .set-row-input {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            background: #1e1e1e;
            padding: 6px;
            border-radius: 8px;
        }
        .set-label { width: 45px; font-size: 13px; font-weight: bold; color: var(--text-muted); flex-shrink: 0; }
        
        .set-row-input input[type="number"] {
            width: 50%;
            min-width: 0;
        }
        .set-row-input select {
            width: 50%;
            min-width: 0;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .delete-btn { background: none; color: var(--accent-red); padding: 0; font-size: 14px; border: none; }
        .edit-btn { background: none; color: var(--accent-color); padding: 0; font-size: 14px; margin-right: 10px; border: none; }
        .edit-btn:focus, .delete-btn:focus { outline: none; }
        .date { color: var(--text-muted); font-size: 14px; }
        
        .history-workout-card {
            background: #2c2c2e;
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
        }
        .history-set { font-size: 14px; color: #d1d1d6; padding-left: 10px; margin-top: 2px; }

        .report-box {
            background-color: #2c2c2e;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            display: none;
        }
    </style>
</head>
<body>

    <!-- TAKVİM BÖLÜMÜ -->
    <div class="section">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="padding: 6px 12px; font-size: 14px;"><</button>
            <h3 id="calendarMonthYear" style="margin: 0;"></h3>
            <button onclick="changeMonth(1)" style="padding: 6px 12px; font-size: 14px;">></button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <p id="selectedDateText" style="text-align: center; margin-top: 10px; font-size: 14px; color: var(--accent-color); font-weight: bold;"></p>
    </div>

    <!-- KİLO & BEL TAKİP BÖLÜMÜ -->
    <div class="section">
        <h2>⚖️ Kilo & Ölçü Takibi</h2>
        <div class="input-row">
            <!-- inputmode ve pattern özellikleri ile sayısal klavye tetiklendi -->
            <input type="number" id="weightInput" class="compact-input" step="0.1" inputmode="decimal" pattern="[0-9]*" placeholder="Kilo (kg)">
            <input type="number" id="waistInput" class="compact-input" step="0.1" inputmode="decimal" pattern="[0-9]*" placeholder="Bel (cm)">
            <button class="compact-btn" onclick="addWeightAndMeasurement()">Kaydet</button>
        </div>
        <div id="weightList"></div>

        <!-- Grafik Alanı -->
        <div class="chart-container">
            <div class="chart-filter-row">
                <button id="cf-3m" class="chart-filter-btn" onclick="setChartFilter('3m')">3 Ay</button>
                <button id="cf-1m" class="chart-filter-btn active" onclick="setChartFilter('1m')">1 Ay</button>
                <button id="cf-1w" class="chart-filter-btn" onclick="setChartFilter('1w')">1 Hafta</button>
            </div>
            <div class="chart-legends">
                <div class="legend-item"><span style="width:12px; height:3px; background:var(--accent-color); display:inline-block;"></span> Kilo</div>
                <div class="legend-item"><span style="width:12px; height:3px; background:#ff9500; display:inline-block;"></span> Bel</div>
            </div>
            <svg id="trendChart" width="100%" height="130" style="background:#1e1e1e; overflow:visible;"></svg>
        </div>
    </div>

    <!-- DAILY SUPPLEMENT TAKİBİ -->
    <div class="section">
        <h2>💊 Günlük Supplementler</h2>
        <div class="supp-grid">
            <div class="supp-card" onclick="toggleSupp('kreatin')">
                <input type="checkbox" id="chk-kreatin" pointer-events="none">
                <span>Kreatin</span>
            </div>
            <div class="supp-card" onclick="toggleSupp('omega3')">
                <input type="checkbox" id="chk-omega3" pointer-events="none">
                <span>Omega 3</span>
            </div>
            <div class="supp-card" onclick="toggleSupp('d3k2')">
                <input type="checkbox" id="chk-d3k2" pointer-events="none">
                <span>D3K2</span>
            </div>
            <div class="supp-card" onclick="toggleSupp('magnezyum')">
                <input type="checkbox" id="chk-magnezyum" pointer-events="none">
                <span>Magnezyum</span>
            </div>
        </div>
    </div>

    <!-- ANTRENMAN BÖLÜMÜ -->
    <div class="section">
        <h2>🏋️‍♂️ Antrenman Takibi</h2>
        
        <h3 style="font-size: 15px; color: var(--text-muted); margin-bottom: 8px;">Seçili Güne Antrenman Başlat:</h3>
        <div class="program-selector">
            <button class="program-btn btn-Push" onclick="startWorkout('Push')">🔴 Push</button>
            <button class="program-btn btn-Pull" onclick="startWorkout('Pull')">🟢 Pull</button>
            <button class="program-btn btn-Legs" onclick="startWorkout('Legs')">🔵 Legs</button>
            <button class="program-btn btn-Off" onclick="saveOffDay()">🛌 Off Day</button>
        </div>
        
        <!-- AKTİF ANTRENMAN ALANI -->
        <div id="activeWorkoutArea" style="display: none; border-top: 2px dashed #48484a; padding-top: 15px; margin-top: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="activeTitle" style="color: var(--accent-green); margin: 0;"></h3>
                <button onclick="finishWorkout()" style="background-color: var(--accent-green); padding: 8px 15px; font-size: 14px;">Antrenmanı Bitir</button>
            </div>
            <div id="exerciseContainer"></div>
        </div>

        <h3 style="margin-top: 25px;" id="historyTitle">Seçili Günün Antrenmanı</h3>
        <div id="workoutList"></div>
    </div>

    <!-- REPORT GENERATOR -->
    <div class="section">
        <h2>📋 Koç Raporları</h2>
        <div style="margin-bottom: 12px;">
            <select id="reportRange" style="width: 100%; margin-bottom: 10px;">
                <option value="today">Bugün</option>
                <option value="week">Bu Hafta</option>
                <option value="month">Bu Ay</option>
            </select>
        </div>
        <div class="input-row">
            <button onclick="generateWorkoutReport()" style="background-color: #ff9500; flex: 1; font-size: 14px; padding: 12px 10px;">🏋️‍♂️ Antrenman Raporu</button>
            <button onclick="generateWeightReport()" style="background-color: #5856d6; flex: 1; font-size: 14px; padding: 12px 10px;">⚖️ Kilo/Form Raporu</button>
        </div>
        <button id="copyReportBtn" onclick="copyReport()" style="width: 100%; display: none; background-color: var(--accent-green); margin-top: 10px;">📋 Raporu Panoya Kopyala</button>
        <div id="reportDisplay" class="report-box"></div>
    </div>

    <script>
        const programs = {
            'Push': ['Bench Press', 'Shoulder Press Machine', 'Pecdeck Fly', 'Cable Triceps Pushdown'],
            'Pull': ['Close Grip Lat Pulldown', 'Chest Supported Row Machine', 'Biceps Curl', 'Reverse Fly'],
            'Legs': ['Squat', 'Hamstring Curl']
        };

        const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const dayNames = ["Pt", "Sa", "Ça", "Pe", "Cu", "Ct", "Pz"];

        let currentCalendarDate = new Date();
        let selectedDateStr = formatDate(new Date());
        let currentChartFilter = '1m';

        let weights = JSON.parse(localStorage.getItem('weights')) || []; 
        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
        let supplements = JSON.parse(localStorage.getItem('supplements')) || {}; 
        let currentWorkout = null;

        function formatDate(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const y = dateObj.getFullYear();
            return `${d}.${m}.${y}`;
        }

        // --- CALENDAR ---
        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            document.getElementById('calendarMonthYear').innerText = `${monthNames[month]} ${year}`;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            dayNames.forEach(name => { grid.innerHTML += `<div class="weekday">${name}</div>`; });

            let firstDayIndex = new Date(year, month, 1).getDay();
            firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) { grid.innerHTML += `<div></div>`; }

            const todayStr = formatDate(new Date());
            for (let day = 1; day <= totalDays; day++) {
                const checkDate = new Date(year, month, day);
                const checkDateStr = formatDate(checkDate);
                
                let dayClass = "day";
                if (checkDateStr === todayStr) dayClass += " today";
                if (checkDateStr === selectedDateStr) dayClass += " selected";

                const workoutOnDay = workouts.find(w => w.date.split(' ')[0] === checkDateStr);
                let dotHtml = '';
                if (workoutOnDay) { dotHtml = `<div class="dot dot-${workoutOnDay.type}"></div>`; }

                grid.innerHTML += `<div class="${dayClass}" onclick="selectDate('${checkDateStr}')">${day}${dotHtml}</div>`;
            }
            document.getElementById('selectedDateText').innerText = `Seçili Gün: ${selectedDateStr}`;
        }

        function changeMonth(direction) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction);
            renderCalendar();
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            renderWeights();
            renderSupplements();
            renderWorkouts();
            if (currentWorkout) {
                currentWorkout.date = `${selectedDateStr} - 12:00`;
                document.getElementById('activeTitle').innerText = `⚡ Aktif: ${currentWorkout.type} (${selectedDateStr})`;
            }
        }

        // --- SUPPLEMENTS ---
        function renderSupplements() {
            const daySupps = supplements[selectedDateStr] || { kreatin: false, omega3: false, d3k2: false, magnezyum: false };
            document.getElementById('chk-kreatin').checked = daySupps.kreatin || false;
            document.getElementById('chk-omega3').checked = daySupps.omega3 || false;
            document.getElementById('chk-d3k2').checked = daySupps.d3k2 || false;
            document.getElementById('chk-magnezyum').checked = daySupps.magnezyum || false;
        }

        function toggleSupp(suppKey) {
            if (!supplements[selectedDateStr]) {
                supplements[selectedDateStr] = { kreatin: false, omega3: false, d3k2: false, magnezyum: false };
            }
            supplements[selectedDateStr][suppKey] = !supplements[selectedDateStr][suppKey];
            localStorage.setItem('supplements', JSON.stringify(supplements));
            renderSupplements();
        }

        // --- WEIGHT & CHART ---
        function setChartFilter(filterType) {
            currentChartFilter = filterType;
            document.querySelectorAll('.chart-filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`cf-${filterType}`).classList.add('active');
            drawChart();
        }

        function saveWeights() { 
            localStorage.setItem('weights', JSON.stringify(weights)); 
            renderWeights(); 
            drawChart();
        }
        
        function addWeightAndMeasurement() {
            const wVal = document.getElementById('weightInput').value;
            const waistVal = document.getElementById('waistInput').value;
            if (!wVal && !waistVal) return;

            const existingIndex = weights.findIndex(w => w.date === selectedDateStr);
            
            if (existingIndex !== -1) {
                if(wVal) weights[existingIndex].val = wVal;
                if(waistVal) weights[existingIndex].waist = waistVal;
            } else {
                weights.unshift({ date: selectedDateStr, val: wVal || '', waist: waistVal || '', id: Date.now() });
            }

            document.getElementById('weightInput').value = '';
            document.getElementById('waistInput').value = '';
            saveWeights();
        }

        function deleteWeight(id) { weights = weights.filter(w => w.id !== id); saveWeights(); }
        
        function renderWeights() {
            const dayWeights = weights.filter(w => w.date === selectedDateStr);
            document.getElementById('weightList').innerHTML = dayWeights.map(w => `
                <div class="list-item">
                    <div>
                        <strong>${w.val ? w.val + ' kg' : ''}</strong> 
                        ${w.val && w.waist ? ' | ' : ''} 
                        <strong>${w.waist ? 'Bel: ' + w.waist + ' cm' : ''}</strong>
                    </div>
                    <button class="delete-btn" onclick="deleteWeight(${w.id})">Sil</button>
                </div>
            `).join('') || '<p style="color:var(--text-muted); font-size:13px;">Bu gün için form kaydı yok.</p>';
        }

        function drawChart() {
            const svg = document.getElementById('trendChart');
            svg.innerHTML = '';
            
            const now = new Date();
            let limitDays = 30;
            if (currentChartFilter === '3m') limitDays = 90;
            if (currentChartFilter === '1w') limitDays = 7;

            const cutoffDate = new Date(now.getTime() - limitDays * 24 * 60 * 60 * 1000);
            
            let chartData = weights.filter(w => parseDate(w.date) >= cutoffDate);
            chartData.sort((a, b) => parseDate(a.date) - parseDate(b.date));

            if (chartData.length < 2) {
                svg.innerHTML = `<text x="50%" y="50%" fill="var(--text-muted)" font-size="12" text-anchor="middle">Grafik için bu dönemde en az 2 kayıt olmalı.</text>`;
                return;
            }

            const width = svg.clientWidth || 340;
            const height = 130;
            const padding = 20;

            let weightVals = chartData.filter(d => d.val).map(d => parseFloat(d.val));
            let waistVals = chartData.filter(d => d.waist).map(d => parseFloat(d.waist));
            
            let minW = weightVals.length ? Math.min(...weightVals) - 1 : 60;
            let maxW = weightVals.length ? Math.max(...weightVals) + 1 : 90;
            let minB = waistVals.length ? Math.min(...waistVals) - 1 : 70;
            let maxB = waistVals.length ? Math.max(...waistVals) + 1 : 100;

            if(minW === maxW) { minW -= 2; maxW += 2; }
            if(minB === maxB) { minB -= 2; maxB += 2; }

            let pointsW = [];
            let pointsB = [];

            chartData.forEach((d, i) => {
                let x = padding + (i * (width - 2 * padding) / (chartData.length - 1));
                
                if (d.val) {
                    let yW = height - padding - ((parseFloat(d.val) - minW) * (height - 2 * padding) / (maxW - minW));
                    pointsW.push(`${x},${yW}`);
                    svg.innerHTML += `<circle cx="${x}" cy="${yW}" r="3" fill="var(--accent-color)" />`;
                }
                if (d.waist) {
                    let yB = height - padding - ((parseFloat(d.waist) - minB) * (height - 2 * padding) / (maxB - minB));
                    pointsB.push(`${x},${yB}`);
                    svg.innerHTML += `<circle cx="${x}" cy="${yB}" r="3" fill="#ff9500" />`;
                }
            });

            if (pointsW.length > 1) {
                svg.innerHTML += `<polyline points="${pointsW.join(' ')}" fill="none" stroke="var(--accent-color)" stroke-width="2" />`;
            }
            if (pointsB.length > 1) {
                svg.innerHTML += `<polyline points="${pointsB.join(' ')}" fill="none" stroke="#ff9500" stroke-width="2" />`;
            }
        }

        // --- WORKOUT ---
        function startWorkout(type) {
            if (currentWorkout && !confirm("Mevcut aktif antrenmanı kapatıp yenisini açmak istiyor musun?")) return;
            currentWorkout = { id: Date.now(), type: type, date: `${selectedDateStr} - 12:00`, data: {} };
            programs[type].forEach(ex => {
                currentWorkout.data[ex] = [{ weight: '', reps: '3' }, { weight: '', reps: '3' }, { weight: '', reps: '3' }];
            });
            document.getElementById('activeTitle').innerText = `⚡ Aktif: ${type} (${selectedDateStr})`;
            document.getElementById('activeWorkoutArea').style.display = 'block';
            renderActiveExercises();
        }

        function saveOffDay() {
            if (currentWorkout && !confirm("Aktif antrenmanı kapatıp bugünü Off Day yapmak istiyor musun?")) return;
            workouts = workouts.filter(w => w.date.split(' ')[0] !== selectedDateStr);
            const offDayObj = { id: Date.now(), type: 'OffDay', date: `${selectedDateStr} - 00:00`, data: {} };
            workouts.unshift(offDayObj);
            localStorage.setItem('workouts', JSON.stringify(workouts));
            currentWorkout = null;
            document.getElementById('activeWorkoutArea').style.display = 'none';
            renderCalendar();
            renderWorkouts();
            alert("Bugün 'Off Day' olarak günlüğe işlendi. İyi dinlenmeler aga!");
        }

        function updateLiveSet(exName, setIndex, field, value) {
            if (currentWorkout && currentWorkout.data[exName]) {
                currentWorkout.data[exName][setIndex][field] = value.trim();
            }
        }

        function renderActiveExercises() {
            const container = document.getElementById('exerciseContainer');
            container.innerHTML = '';
            for (let exName in currentWorkout.data) {
                let exBox = document.createElement('div');
                exBox.className = 'exercise-box';
                exBox.innerHTML = `<div class="exercise-title">${exName}</div>`;
                for (let i = 0; i < 3; i++) {
                    const setObj = currentWorkout.data[exName][i];
                    let repsOptions = '';
                    for (let r = 3; r <= 12; r++) {
                        const selected = setObj.reps == r ? 'selected' : '';
                        repsOptions += `<option value="${r}" ${selected}>${r} Tekrar</option>`;
                    }
                    exBox.innerHTML += `
                        <div class="set-row-input">
                            <span class="set-label">${i+1}. Set</span>
                            <!-- inputmode ve pattern özellikleri buradaki sayı girişlerine de eklendi -->
                            <input type="number" value="${setObj.weight}" placeholder="kg" inputmode="decimal" pattern="[0-9]*" oninput="updateLiveSet('${exName}', ${i}, 'weight', this.value)">
                            <select onchange="updateLiveSet('${exName}', ${i}, 'reps', this.value)">${repsOptions}</select>
                        </div>
                    `;
                }
                container.appendChild(exBox);
            }
        }

        function finishWorkout() {
            if (!currentWorkout) return;
            
            let finalData = {};
            for (let ex in currentWorkout.data) {
                let filledSets = currentWorkout.data[ex].filter(s => s.weight !== '');
                if (filledSets.length > 0) finalData[ex] = filledSets;
            }
            
            if (Object.keys(finalData).length === 0) {
                currentWorkout = null;
                document.getElementById('activeWorkoutArea').style.display = 'none';
                renderCalendar();
                renderWorkouts();
                return;
            }

            currentWorkout.data = finalData;
            
            workouts = workouts.filter(w => w.id !== currentWorkout.id && w.date.split(' ')[0] !== selectedDateStr);
            workouts.unshift(currentWorkout);

            localStorage.setItem('workouts', JSON.stringify(workouts));
            currentWorkout = null;
            document.getElementById('activeWorkoutArea').style.display = 'none';
            renderCalendar();
            renderWorkouts();
            alert("Antrenman kaydedildi!");
        }

        function editWorkout(id) {
            const target = workouts.find(w => w.id === id);
            if (!target || target.type === 'OffDay') return;

            currentWorkout = { id: target.id, type: target.type, date: target.date, data: {} };
            const defaultExercises = programs[target.type] || Object.keys(target.data);
            defaultExercises.forEach(ex => {
                currentWorkout.data[ex] = [{ weight: '', reps: '3' }, { weight: '', reps: '3' }, { weight: '', reps: '3' }];
            });

            for (let ex in target.data) {
                if (!currentWorkout.data[ex]) currentWorkout.data[ex] = [{ weight: '', reps: '3' }, { weight: '', reps: '3' }, { weight: '', reps: '3' }];
                target.data[ex].forEach((set, idx) => {
                    if (idx < 3) currentWorkout.data[ex][idx] = { weight: set.weight, reps: set.reps };
                });
            }
            document.getElementById('activeTitle').innerText = `✏️ Düzenle: ${target.type}`;
            document.getElementById('activeWorkoutArea').style.display = 'block';
            renderActiveExercises();
            window.scrollTo({ top: document.getElementById('activeWorkoutArea').offsetTop, behavior: 'smooth' });
        }

        function deleteWorkout(id) {
            if (confirm("Bu kaydı silmek istiyor musun?")) {
                workouts = workouts.filter(w => w.id !== id);
                localStorage.setItem('workouts', JSON.stringify(workouts));
                renderCalendar();
                renderWorkouts();
            }
        }

        function renderWorkouts() {
            const list = document.getElementById('workoutList');
            document.getElementById('historyTitle').innerText = `${selectedDateStr} Gününün Kaydı`;
            const dayWorkouts = workouts.filter(w => w.date.split(' ')[0] === selectedDateStr);

            list.innerHTML = dayWorkouts.map(w => {
                if (w.type === 'OffDay') {
                    return `
                        <div style="margin-bottom: 20px; padding: 12px; background:#2c2c2e; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                            <span style="color: var(--accent-off); font-weight:bold;">🛌 BUGÜN OFF DAY (Dinlenme Günü)</span>
                            <button class="delete-btn" onclick="deleteWorkout(${w.id})">Sil</button>
                        </div>
                    `;
                }
                let exHtml = '';
                for (let exName in w.data) {
                    exHtml += `<div class="history-workout-card"><strong>${exName}</strong>`;
                    w.data[exName].forEach((set, idx) => {
                        exHtml += `<div class="history-set">Set ${idx+1}: ${set.weight || 0} kg x ${set.reps || 0} Tekrar</div>`;
                    });
                    exHtml += `</div>`;
                }
                return `
                    <div style="margin-bottom: 20px; padding-bottom: 15px;">
                        <div class="list-item">
                            <span style="font-weight: bold; color: var(--accent-color);">${w.date.split(' - ')[0]} - ${w.type}</span>
                            <div>
                                <button class="edit-btn" onclick="editWorkout(${w.id})">Düzenle</button>
                                <button class="delete-btn" onclick="deleteWorkout(${w.id})">Sil</button>
                            </div>
                        </div>
                        ${exHtml || '<p style="color:var(--text-muted); font-size:13px;">Set girilmedi.</p>'}
                    </div>
                `;
            }).join('') || '<p style="color:var(--text-muted); font-size:13px;">Bu gün için antrenman veya Off Day kaydı yok.</p>';
        }

        // --- REPORT ---
        function parseDate(str) {
            const parts = str.split('.');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function getFilteredData(array, range, isWorkout = true) {
            const now = new Date();
            let filtered = [];
            if (range === 'today') {
                const todayStr = formatDate(now);
                filtered = array.filter(item => (isWorkout ? item.date.split(' ')[0] : item.date) === todayStr);
            } else if (range === 'week') {
                const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                filtered = array.filter(item => parseDate(isWorkout ? item.date.split(' ')[0] : item.date) >= oneWeekAgo);
            } else if (range === 'month') {
                const oneMonthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                filtered = array.filter(item => parseDate(isWorkout ? item.date.split(' ')[0] : item.date) >= oneMonthAgo);
            }
            return filtered;
        }

        function generateWorkoutReport() {
            const range = document.getElementById('reportRange').value;
            let filtered = getFilteredData(workouts, range, true);

            if (filtered.length === 0) {
                document.getElementById('reportDisplay').innerText = "Bu zaman aralığında kayıt bulunamadı.";
                document.getElementById('reportDisplay').style.display = 'block';
                document.getElementById('copyReportBtn').style.display = 'none';
                return;
            }

            filtered.sort((a, b) => parseDate(a.date.split(' ')[0]) - parseDate(b.date.split(' ')[0]));

            let reportText = `🏋️‍♂️ FitTrack Antrenman Raporu\n`;
            reportText += `🗓️ Dönem: ${range.toUpperCase()}\n`;
            reportText += `--------------------------------\n\n`;

            filtered.forEach(w => {
                const pureDateStr = w.date.split(' ')[0];
                if (w.type === 'OffDay') {
                    reportText += `📅 Tarih: ${pureDateStr} -> 🛌 OFF DAY (Dinlenme Günü)\n\n`;
                    return;
                }
                reportText += `📅 Tarih: ${pureDateStr} (${w.type})\n`;
                for (let ex in w.data) {
                    reportText += `  • ${ex}:\n`;
                    w.data[ex].forEach((set, idx) => {
                        reportText += `    - Set ${idx+1}: ${set.weight} kg x ${set.reps} Tekrar\n`;
                    });
                }
                reportText += `\n`;
            });
            showReport(reportText);
        }

        function generateWeightReport() {
            const range = document.getElementById('reportRange').value;
            let filtered = getFilteredData(weights, range, false);
            if (filtered.length === 0) {
                document.getElementById('reportDisplay').innerText = "Bu zaman aralığında kilo/form kaydı bulunamadı.";
                document.getElementById('reportDisplay').style.display = 'block';
                document.getElementById('copyReportBtn').style.display = 'none';
                return;
            }
            filtered.sort((a, b) => parseDate(a.date) - parseDate(b.date));

            let reportText = `⚖️ FitTrack Kilo & Form Raporu\n`;
            reportText += `🗓️ Dönem: ${range.toUpperCase()}\n`;
            reportText += `--------------------------------\n\n`;

            filtered.forEach(w => {
                let details = [];
                if(w.val) details.push(`${w.val} kg`);
                if(w.waist) details.push(`Bel: ${w.waist} cm`);
                reportText += `📅 ${w.date} -> ${details.join(' | ')}\n`;
            });
            showReport(reportText);
        }

        function showReport(text) {
            const display = document.getElementById('reportDisplay');
            display.innerText = text;
            display.style.display = 'block';
            document.getElementById('copyReportBtn').style.display = 'block';
        }

        function copyReport() {
            const reportText = document.getElementById('reportDisplay').innerText;
            navigator.clipboard.writeText(reportText).then(() => {
                alert("Rapor panoya kopyalandı! WhatsApp'tan yapıştırıp koçuna gönderebilirsin.");
            });
        }

        renderCalendar();
        renderWeights();
        renderSupplements();
        renderWorkouts();
        setTimeout(drawChart, 300);
    </script>
</body>
</html>
